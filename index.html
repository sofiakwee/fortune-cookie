<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortune Cookie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Georgia, serif;
      overflow: hidden;
    }

    h1 {
      color: #c8902a;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    #cookie {
      font-size: 10rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
      filter: drop-shadow(0 0 30px rgba(200, 144, 42, 0.4));
    }

    #cookie:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 50px rgba(200, 144, 42, 0.7));
    }

    #cookie:active {
      transform: scale(0.95);
    }

    #cookie.cracked {
      animation: crack 0.4s ease forwards;
    }

    @keyframes crack {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.15) rotate(-5deg); }
      60%  { transform: scale(0.9) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #hint {
      color: #c8902a;
      opacity: 0.5;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    /* Fortune overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    #overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #fortune-card {
      background: #fdf6e3;
      border: 2px solid #c8902a;
      border-radius: 4px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      position: relative;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #fortune-card::before {
      content: "✦  Your Fortune  ✦";
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #c8902a;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #fortune-text {
      font-size: 1.25rem;
      color: #2c1a00;
      line-height: 1.7;
      font-style: italic;
    }

    #lucky-numbers {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #c8902a;
      letter-spacing: 0.1em;
    }

    #close-btn {
      margin-top: 2rem;
      background: none;
      border: 1px solid #c8902a;
      color: #c8902a;
      padding: 0.5rem 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }

    #close-btn:hover {
      background: #c8902a;
      color: #1a0a00;
    }
  </style>
</head>
<body>

  <h1>Fortune Cookie</h1>
  <div id="cookie">🥠</div>
  <p id="hint">click to reveal your fortune</p>

  <div id="overlay">
    <div id="fortune-card">
      <p id="fortune-text"></p>
      <p id="lucky-numbers"></p>
      <button id="close-btn">Close</button>
    </div>
  </div>

  <script>
    const fortunes = [
      // — Arnav —
      "Arnav once asked Tony Stark for career advice. Stark told him to do the work. Arnav is still thinking about it.",
      "Peter Parker was bitten by a spider. Arnav was bitten by a trail, a cheesecake, and a deep mistrust of thin crusts.",
      "The villain in Arnav's story is not Thanos. It is the assignment he has been ignoring since Tuesday.",
      "Arnav does not need a vibranium shield. He needs good boots, a summit, and someone waiting at the bottom with dessert.",
      "Thor once offered Arnav Mjolnir. Arnav said he would pick it up after his hike.",
      "A cheesecake sits at the crossroads of every great decision Arnav has ever made. This is not a warning. This is a fact.",
      "In a just universe, every bully eventually meets someone like Arnav on a trail with nothing to lose and excellent cardio.",
      "Arnav does not avoid work. He simply operates on a timeline that work has not been informed of.",
      "When Arnav finally does the work, the work is afraid of him.",
      "Doctor Strange saw fourteen million futures. In every single one, Arnav found the cheesecake.",

      // — Luke —
      "Luke arrived overdressed to the avalanche. The mountain was intimidated.",
      "Somewhere in the world, a powder run is being groomed specifically for Luke's arrival.",
      "Luke's passport has more stamps than most museums have artifacts — and better stories behind each one.",
      "Even at the top of a black diamond slope, Luke looked like he had just stepped off a runway.",
      "A well-dressed man in a foreign city is never lost. He is simply being admired from a distance.",
      "Luke once turned down a beige jacket. The jacket has not recovered.",
      "The slopes of four continents know Luke's name. Three more are still waiting to be impressed.",
      "Luke's greatest fear is not the steepest run on the mountain. It is arriving to après-ski looking like everyone else.",
      "Somewhere a chef is preparing a dish that will change Luke's life. Luke is already on the flight.",
      "Luke does not walk into a room. He arrives — and the room adjusts accordingly.",

      // — Arnav & Sofia —
      "Arnav climbed every mountain looking for something worth the descent. He found Sofia.",
      "Even Tony Stark needed Pepper. Arnav has Sofia, which is objectively better.",
      "Sofia is the one person Arnav would pause a Marvel marathon for. He has done it twice.",
      "The trail always leads home. For Arnav, home has Sofia in it.",
      "Arnav once said he did not believe in magic. Then he met Sofia and quietly revised his entire worldview.",
      "Behind every great hiker is someone who texted him to be careful on the trail and had cheesecake ready when he returned.",
      "Arnav would fight the Avengers for Sofia. The Avengers are aware and have chosen not to test this.",

      // — All three —
      "Arnav brought the trail mix. Luke wore the better jacket. Sofia made everyone stop arguing about the pizza.",
      "Luke's outfit survived the chairlift. Arnav complained about the lodge's pizza. Sofia had already found a better restaurant.",
      "Three people walked into the unknown. Only the unknown was nervous.",
      "The universe gave Arnav a mountain, Luke a powder run, and Sofia the good sense to bring snacks for both of them.",
      "Arnav protects the group. Luke navigates in style. Sofia keeps them both from making poor decisions. This is the team.",
      "One day Arnav, Luke, and Sofia will look back on all of it and agree: the cheesecake was always worth it.",
    ];

    function randomLucky() {
      const nums = [];
      while (nums.length < 6) {
        const n = Math.floor(Math.random() * 49) + 1;
        if (!nums.includes(n)) nums.push(n);
      }
      return "Lucky numbers: " + nums.sort((a,b)=>a-b).join("  ·  ");
    }

    const cookie  = document.getElementById("cookie");
    const overlay = document.getElementById("overlay");
    const text    = document.getElementById("fortune-text");
    const lucky   = document.getElementById("lucky-numbers");
    const closeBtn = document.getElementById("close-btn");

    cookie.addEventListener("click", () => {
      cookie.classList.add("cracked");
      setTimeout(() => {
        const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
        text.textContent = fortune;
        lucky.textContent = randomLucky();
        overlay.classList.add("show");
      }, 300);
    });

    function closeFortune() {
      overlay.classList.remove("show");
      cookie.classList.remove("cracked");
    }

    closeBtn.addEventListener("click", closeFortune);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeFortune();
    });
  </script>
</body>
</html>
