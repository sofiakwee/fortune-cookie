<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortune Cookie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Georgia, serif;
      overflow: hidden;
    }

    h1 {
      color: #c8902a;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    #cookie {
      font-size: 10rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
      filter: drop-shadow(0 0 30px rgba(200, 144, 42, 0.4));
    }

    #cookie:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 50px rgba(200, 144, 42, 0.7));
    }

    #cookie:active {
      transform: scale(0.95);
    }

    #cookie.cracked {
      animation: crack 0.4s ease forwards;
    }

    @keyframes crack {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.15) rotate(-5deg); }
      60%  { transform: scale(0.9) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #hint {
      color: #c8902a;
      opacity: 0.5;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    /* Fortune overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    #overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #fortune-card {
      background: #fdf6e3;
      border: 2px solid #c8902a;
      border-radius: 4px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      position: relative;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #fortune-card::before {
      content: "✦  Your Fortune  ✦";
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #c8902a;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #fortune-text {
      font-size: 1.25rem;
      color: #2c1a00;
      line-height: 1.7;
      font-style: italic;
    }

    #lucky-numbers {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #c8902a;
      letter-spacing: 0.1em;
    }

    #close-btn {
      margin-top: 2rem;
      background: none;
      border: 1px solid #c8902a;
      color: #c8902a;
      padding: 0.5rem 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }

    #close-btn:hover {
      background: #c8902a;
      color: #1a0a00;
    }
  </style>
</head>
<body>

  <h1>Fortune Cookie</h1>
  <div id="cookie">🥠</div>
  <p id="hint">click to reveal your fortune</p>

  <div id="overlay">
    <div id="fortune-card">
      <p id="fortune-text"></p>
      <p id="lucky-numbers"></p>
      <button id="close-btn">Close</button>
    </div>
  </div>

  <script>
    const fortunes = [
      // — Arnav —
      "Arnav will one day hike a mountain so tall, even the clouds ask him for directions.",
      "A cheesecake waits for Arnav at the top of every summit. He just has to climb for it.",
      "Arnav's superpower is not flying or strength — it is showing up when it matters most.",
      "The trail Arnav walks today becomes the story he tells tomorrow.",
      "Arnav will defeat his greatest villain yet: his to-do list.",
      "Beware, Arnav — the only thing harder than a steep trail is admitting the NYC slice was actually fine.",
      "Arnav does not avoid work. He simply waits for it to become interesting enough.",
      "A hero is not born in a cape. Sometimes he is born with hiking boots and a fork pointed at cheesecake.",
      "Arnav's enemies fear him. His enemies include bullies, bad pizza, and early Monday meetings.",
      "The mountain does not care how long it takes Arnav to climb it. Neither should he.",

      // — Luke —
      "Luke will find the most beautiful meal of his life in a city he has never heard of.",
      "Every dark room Luke enters holds a light he has not discovered yet.",
      "Luke's next adventure is already boarding. He just needs to pack.",
      "The world is large, but Luke is larger in spirit. He will see all of it.",
      "Love is the one destination Luke has not yet booked — but the ticket is closer than he thinks.",
      "Luke will fall in love in a city with good food and even better sunsets.",
      "A boring life is the only thing Luke should ever fear — and he is already outrunning it.",
      "Somewhere between the appetizer and dessert, Luke will meet someone worth staying for.",
      "The best travel companion Luke has not yet met is already on their way to him.",
      "Luke's heart is a passport with no empty pages — and room for one more stamp.",

      // — Arnav & Luke together —
      "Arnav and Luke will one day hike to a distant country, argue about the food, and call it the best trip of their lives.",
      "Where Luke wanders and Arnav climbs, great stories are made.",
      "Arnav brings the trail mix. Luke finds the restaurant at the bottom of the mountain. Together, they eat well.",
      "Luke will drag Arnav to a new city. Arnav will find the nearest hill to climb. Both will be happy.",
      "The universe has assigned Arnav and Luke to the same adventure — whether they like it or not.",
      "Arnav and Luke will one day realize that the best superhero team requires a hiker and a traveler.",
      "A great friendship needs two things: someone who plans the hike, and someone who finds dessert after.",
      "Luke keeps things exciting. Arnav keeps things grounded. Together, they keep each other going.",
      "Arnav will protect Luke from bullies. Luke will protect Arnav from boring itineraries. Balance is restored.",
      "Two friends, infinite roads, zero bad pizza. The legend of Arnav and Luke continues.",
    ];

    function randomLucky() {
      const nums = [];
      while (nums.length < 6) {
        const n = Math.floor(Math.random() * 49) + 1;
        if (!nums.includes(n)) nums.push(n);
      }
      return "Lucky numbers: " + nums.sort((a,b)=>a-b).join("  ·  ");
    }

    const cookie  = document.getElementById("cookie");
    const overlay = document.getElementById("overlay");
    const text    = document.getElementById("fortune-text");
    const lucky   = document.getElementById("lucky-numbers");
    const closeBtn = document.getElementById("close-btn");

    cookie.addEventListener("click", () => {
      cookie.classList.add("cracked");
      setTimeout(() => {
        const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
        text.textContent = fortune;
        lucky.textContent = randomLucky();
        overlay.classList.add("show");
      }, 300);
    });

    function closeFortune() {
      overlay.classList.remove("show");
      cookie.classList.remove("cracked");
    }

    closeBtn.addEventListener("click", closeFortune);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeFortune();
    });
  </script>
</body>
</html>
